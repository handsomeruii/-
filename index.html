<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>3D构件全向移动版</title>
  <style>
    * { touch-action: none; -webkit-tap-highlight-color: transparent; }
    body { margin: 0; overflow: hidden; background-color: #1a1a1a; font-family: sans-serif; }
    canvas { display: block; }

    /* 顶部提示 */
    .ui-tips {
      position: absolute; top: 10px; width: 100%; text-align: center;
      color: #aaa; font-size: 12px; pointer-events: none;
    }

    /* 右侧控制组 */
    .control-box {
      position: absolute; bottom: 30px; right: 20px;
      display: flex; flex-direction: column; gap: 12px;
    }

    .btn {
      width: 50px; height: 50px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 12px; color: white; font-size: 20px;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      backdrop-filter: blur(10px);
    }
    .btn span { font-size: 10px; margin-top: 2px; }
    .btn:active { background: #ff3b30; }

    /* 选中提示标签 */
    #select-tag {
      position: absolute; top: 40px; left: 50%; transform: translateX(-50%);
      background: #ff3b30; color: white; padding: 4px 12px;
      border-radius: 15px; font-size: 12px; display: none;
    }
  </style>
</head>
<body>

<div class="ui-tips">拖拽：前后左右 | 按钮：升降、旋转、缩放</div>
<div id="select-tag">已选中构件</div>

<div class="control-box">
  <div class="btn" id="up-btn">▲<span>升</span></div>
  <div class="btn" id="down-btn">▼<span>降</span></div>
  <hr style="width:100%; border:0; border-top:1px solid rgba(255,255,255,0.1)">
  <div class="btn" id="rotate-btn">↻</div>
  <div class="btn" id="plus-btn">＋</div>
  <div class="btn" id="minus-btn">－</div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.158/build/three.module.js",
    "three/examples/jsm/": "https://cdn.jsdelivr.net/npm/three@0.158/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/examples/jsm/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/examples/jsm/controls/OrbitControls.js';
import { DragControls } from 'three/examples/jsm/controls/DragControls.js';

// --- 场景初始化 ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a1a);
const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(8, 8, 8);

const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.outputColorSpace = THREE.SRGBColorSpace;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

const allModels = [];
const activeSelection = [];
let currentObj = null;

// --- 拖拽逻辑 (左右前后) ---
const dragControls = new DragControls(activeSelection, camera, renderer.domElement);
dragControls.transformGroup = true;

dragControls.addEventListener('dragstart', () => controls.enabled = false);
dragControls.addEventListener('dragend', () => controls.enabled = true);
dragControls.addEventListener('drag', (e) => {
    // 自动吸附对齐 (0.2米为单位)
    const s = 0.2;
    e.object.position.x = Math.round(e.object.position.x / s) * s;
    e.object.position.z = Math.round(e.object.position.z / s) * s;
    // 注意：这里不再强制 y=0，允许保留之前调整的高度
});

// --- 点击选中逻辑 ---
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

renderer.domElement.addEventListener('touchstart', (e) => {
    const touch = e.touches[0];
    mouse.x = (touch.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(touch.clientY / window.innerHeight) * 2 + 1;
    
    raycaster.setFromCamera(mouse, camera);
    const hits = raycaster.intersectObjects(allModels, true);

    if (hits.length > 0) {
        let obj = hits[0].object;
        while (obj.parent && !allModels.includes(obj)) obj = obj.parent;
        
        if (allModels.includes(obj)) {
            activeSelection.length = 0;
            activeSelection.push(obj);
            currentObj = obj;
            // 变色反馈
            allModels.forEach(m => m.traverse(c => c.isMesh && c.material.emissive?.set(0x000000)));
            obj.traverse(c => c.isMesh && c.material.emissive?.set(0x331111));
            document.getElementById('select-tag').style.display = 'block';
        }
    } else {
        if (!e.target.closest('.btn')) {
            activeSelection.length = 0;
            currentObj = null;
            allModels.forEach(m => m.traverse(c => c.isMesh && c.material.emissive?.set(0x000000)));
            document.getElementById('select-tag').style.display = 'none';
        }
    }
}, { passive: true });

// --- 按钮功能：升降、旋转、缩放 ---
const step = 0.2; // 每次移动/缩放的幅度

document.getElementById('up-btn').onclick = () => {
    if (currentObj) currentObj.position.y += step;
};
document.getElementById('down-btn').onclick = () => {
    if (currentObj) currentObj.position.y -= step;
};
document.getElementById('rotate-btn').onclick = () => {
    if (currentObj) currentObj.rotation.y += Math.PI / 2;
};
document.getElementById('plus-btn').onclick = () => {
    if (currentObj) currentObj.scale.multiplyScalar(1.1);
};
document.getElementById('minus-btn').onclick = () => {
    if (currentObj) currentObj.scale.divideScalar(1.1);
};

// --- 模型加载 ---
const loader = new GLTFLoader();
const load = (url, x, z) => {
    loader.load(url, (gltf) => {
        const m = gltf.scene;
        // 初始落地位置
        const b = new THREE.Box3().setFromObject(m);
        m.position.set(x, -b.min.y, z);
        scene.add(m);
        allModels.push(m);
    });
};

// 请修改为你对应的英文文件名
load('./model/1.glb', 0, 0);
load('./model/wall.glb', 0, 0);
load('./model/pillar.glb', 0, 0);
load('./model/dougong.glb', 0, 0);

// --- 辅助线与灯光 ---
scene.add(new THREE.AmbientLight(0xffffff, 1.5));
const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(5, 10, 5);
scene.add(light);
scene.add(new THREE.GridHelper(20, 20, 0x444444, 0x222222));

function animate() {
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
}
animate();

window.onresize = () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
};
</script>
</body>
</html>
