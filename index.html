<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>3D构件整体控制-带导出版</title>
  <style>
    * { touch-action: none; -webkit-tap-highlight-color: transparent; }
    body { margin: 0; overflow: hidden; background-color: #1a1a1a; font-family: sans-serif; }
    canvas { display: block; }

    /* UI 顶部提示 */
    .ui-tips { position: absolute; top: 10px; width: 100%; text-align: center; color: #aaa; font-size: 11px; pointer-events: none; z-index: 10; }
    
    /* 核心：地址输入框 */
    .address-bar {
      position: absolute; top: 40px; left: 10px; right: 10px;
      display: flex; gap: 5px; z-index: 20;
    }
    #save-path {
      flex: 1; background: rgba(0,0,0,0.5); border: 1px solid #444; 
      color: #0ff; padding: 8px; border-radius: 8px; font-size: 13px;
    }

    /* 选中提示 */
    #select-tag { 
      position: absolute; top: 85px; left: 50%; transform: translateX(-50%); 
      background: #ff3b30; color: white; padding: 4px 15px; border-radius: 20px; 
      font-size: 12px; display: none; z-index: 10;
    }

    /* 左右控制组 */
    .system-box { position: absolute; bottom: 30px; left: 20px; display: flex; flex-direction: column; gap: 10px; }
    .control-box { position: absolute; bottom: 30px; right: 20px; display: flex; flex-direction: column; gap: 10px; }

    .btn {
      width: 55px; height: 55px; background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 15px; color: white; font-size: 16px; display: flex; flex-direction: column; align-items: center; justify-content: center; backdrop-filter: blur(10px);
    }
    .btn span { font-size: 10px; margin-top: 2px; }
    .btn-sys { background: rgba(0, 122, 255, 0.3); } 
    .btn:active { transform: scale(0.9); background: #ff3b30; }
  </style>
</head>
<body>

<div class="ui-tips">输入文件名保存到本地 | 或输入 URL 发送到服务器</div>

<div class="address-bar">
  <input type="text" id="save-path" placeholder="输入保存文件名 (如: 我的屋顶1)" value="my_3d_project">
</div>

<div id="select-tag">已选中：构件整体</div>

<div class="system-box">
  <div class="btn btn-sys" id="undo-btn">↶<span>撤回</span></div>
  <div class="btn btn-sys" id="save-btn">💾<span>保存</span></div>
  <div class="btn btn-sys" id="reset-btn">🔄<span>重置</span></div>
</div>

<div class="control-box">
  <div class="btn" id="up-btn">▲<span>升</span></div>
  <div class="btn" id="down-btn">▼<span>降</span></div>
  <hr style="width:100%; border:0; border-top:1px solid rgba(255,255,255,0.1)">
  <div class="btn" id="rotate-btn">↻</div>
  <div class="btn" id="plus-btn">＋</div>
  <div class="btn" id="minus-btn">－</div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.158/build/three.module.js",
    "three/examples/jsm/": "https://cdn.jsdelivr.net/npm/three@0.158/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/examples/jsm/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/examples/jsm/controls/OrbitControls.js';
import { DragControls } from 'three/examples/jsm/controls/DragControls.js';

// --- 初始化场景 ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a1a);
const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(10, 10, 10);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

// --- 变量 ---
const allComponents = [];
const activeSelection = [];
let currentSelected = null;
const historyStack = [];

// --- 记录状态 (撤回) ---
function recordState() {
    const state = allComponents.map(m => ({
        name: m.userData.cnName,
        pos: m.position.clone(),
        rot: m.rotation.clone(),
        sca: m.scale.clone()
    }));
    historyStack.push(state);
    if (historyStack.length > 20) historyStack.shift();
}

// --- 整体变换逻辑 ---
const dragControls = new DragControls(activeSelection, camera, renderer.domElement);
dragControls.transformGroup = true; 
dragControls.addEventListener('dragstart', () => { recordState(); controls.enabled = false; });
dragControls.addEventListener('dragend', () => controls.enabled = true);

// --- 点击选中 (向上追溯根节点) ---
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

renderer.domElement.addEventListener('touchstart', (e) => {
    const touch = e.touches[0];
    mouse.x = (touch.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(touch.clientY / window.innerHeight) * 2 + 1;
    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObjects(allComponents, true);

    if (intersects.length > 0) {
        let target = intersects[0].object;
        while (target.parent && !allComponents.includes(target)) target = target.parent;
        if (allComponents.includes(target)) {
            currentSelected = target;
            activeSelection.length = 0;
            activeSelection.push(target);
            allComponents.forEach(m => m.traverse(n => n.isMesh && n.material.emissive?.set(0x000000)));
            target.traverse(n => n.isMesh && n.material.emissive?.set(0x221111));
            document.getElementById('select-tag').innerText = "选中：" + target.userData.cnName;
            document.getElementById('select-tag').style.display = 'block';
        }
    } else if (!e.target.closest('.btn') && !e.target.closest('input')) {
        currentSelected = null;
        activeSelection.length = 0;
        allComponents.forEach(m => m.traverse(n => n.isMesh && n.material.emissive?.set(0x000000)));
        document.getElementById('select-tag').style.display = 'none';
    }
}, { passive: true });

// --- 加载构件 ---
const loader = new GLTFLoader();
const loadComponent = (url, cnName) => {
    loader.load(url, (gltf) => {
        const root = gltf.scene;
        root.userData.cnName = cnName;
        scene.add(root);
        allComponents.push(root);
    });
};

loadComponent('./model/1.glb', '屋顶整体');
loadComponent('./model/wall.glb', '墙体整体');
loadComponent('./model/pillar.glb', '柱子整体');
loadComponent('./model/dougong.glb', '斗拱整体');

// --- 核心修改：保存地址/文件功能 ---
document.getElementById('save-btn').onclick = () => {
    const pathValue = document.getElementById('save-path').value;
    if (!pathValue) return alert("请在上方输入文件名或地址");

    const layoutData = allComponents.map(m => ({
        name: m.userData.cnName,
        position: m.position,
        rotation: { x: m.rotation.x, y: m.rotation.y, z: m.rotation.z },
        scale: m.scale
    }));

    const jsonContent = JSON.stringify(layoutData, null, 2);

    // 判断是 URL 还是 文件名
    if (pathValue.startsWith('http')) {
        // 方案 A：发送到服务器地址 (API)
        fetch(pathValue, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: jsonContent
        })
        .then(res => alert('已尝试发送到服务器地址'))
        .catch(err => alert('服务器保存失败: ' + err.message));
    } else {
        // 方案 B：保存为本地文件下载
        const blob = new Blob([jsonContent], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.download = pathValue.endsWith('.json') ? pathValue : pathValue + ".json";
        link.click();
        URL.revokeObjectURL(url);
        alert('配置已作为文件下载：' + link.download);
    }
};

// 其他按钮
document.getElementById('undo-btn').onclick = () => {
    if (historyStack.length === 0) return;
    const last = historyStack.pop();
    last.forEach(item => {
        const target = allComponents.find(m => m.userData.cnName === item.name);
        if (target) {
            target.position.copy(item.pos);
            target.rotation.copy(item.rot);
            target.scale.copy(item.sca);
        }
    });
};

document.getElementById('reset-btn').onclick = () => {
    if(!confirm('确定重置吗？')) return;
    allComponents.forEach(m => { m.position.set(0,0,0); m.rotation.set(0,0,0); m.scale.set(1,1,1); });
};

const step = 0.2;
document.getElementById('up-btn').onclick = () => { if(currentSelected){ recordState(); currentSelected.position.y += step; } };
document.getElementById('down-btn').onclick = () => { if(currentSelected){ recordState(); currentSelected.position.y -= step; } };
document.getElementById('rotate-btn').onclick = () => { if(currentSelected){ recordState(); currentSelected.rotation.y += Math.PI/2; } };
document.getElementById('plus-btn').onclick = () => { if(currentSelected){ recordState(); currentSelected.scale.multiplyScalar(1.1); } };
document.getElementById('minus-btn').onclick = () => { if(currentSelected){ recordState(); currentSelected.scale.divideScalar(1.1); } };

// 灯光渲染
scene.add(new THREE.AmbientLight(0xffffff, 1.2));
const sun = new THREE.DirectionalLight(0xffffff, 0.8);
sun.position.set(5, 10, 7);
scene.add(sun);
scene.add(new THREE.GridHelper(20, 20, 0x444444, 0x222222));

function animate() { requestAnimationFrame(animate); controls.update(); renderer.render(scene, camera); }
animate();

window.onresize = () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
};
</script>
</body>
</html>
