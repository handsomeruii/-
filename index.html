<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>SU构件手机拼接版</title>
  <style>
    body { margin: 0; overflow: hidden; background-color: #222; font-family: -apple-system, sans-serif; }
    canvas { display: block; }

    /* 顶部状态提示 */
    #status-bar {
      position: absolute; top: 0; left: 0; width: 100%;
      background: rgba(0,0,0,0.4); color: white;
      padding: 10px; font-size: 12px; text-align: center;
      pointer-events: none; z-index: 10;
    }

    /* 右侧控制中心 */
    .control-panel {
      position: absolute; bottom: 30px; right: 20px;
      display: flex; flex-direction: column; gap: 15px;
      z-index: 100;
    }

    /* 按钮基础样式 */
    .btn {
      width: 60px; height: 60px;
      background: rgba(255, 255, 255, 0.15);
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 12px;
      color: white; font-size: 24px;
      display: flex; align-items: center; justify-content: center;
      backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
      touch-action: none; /* 防止浏览器默认手势 */
    }

    .btn:active { background: rgba(255, 255, 255, 0.4); transform: scale(0.9); }
    
    /* 选中标识 */
    #selected-indicator {
      position: absolute; top: 50px; left: 50%; transform: translateX(-50%);
      background: #ff3b30; color: white; padding: 5px 15px;
      border-radius: 20px; font-size: 12px; display: none;
      z-index: 10;
    }
  </style>
</head>
<body>

<div id="status-bar">单指旋转视角 / 双指缩放平移 / 点击构件移动</div>
<div id="selected-indicator">当前已选中构件</div>

<div class="control-panel">
  <div class="btn" id="btn-rotate">↻</div>
  <div class="btn" id="btn-plus">＋</div>
  <div class="btn" id="btn-minus">－</div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.158/build/three.module.js",
    "three/examples/jsm/": "https://cdn.jsdelivr.net/npm/three@0.158/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/examples/jsm/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/examples/jsm/controls/OrbitControls.js';
import { DragControls } from 'three/examples/jsm/controls/DragControls.js';

// --- 1. 基础场景设置 ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x222222);
const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(10, 10, 10);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // 针对高分屏优化性能
renderer.outputColorSpace = THREE.SRGBColorSpace;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true; // 增加滑动丝滑感

const allModels = []; 
const activeSelection = []; 
let currentSelectedModel = null;

// --- 2. 射线检测 (手机点击选中) ---
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

renderer.domElement.addEventListener('pointerdown', (event) => {
    // 归一化点击坐标
    mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObjects(allModels, true);

    if (intersects.length > 0) {
        let object = intersects[0].object;
        while (object.parent && !allModels.includes(object)) object = object.parent;
        if (allModels.includes(object)) selectObject(object);
    } else {
        // 如果点的不是按钮，就取消选中
        if (!event.target.closest('.btn')) clearSelection();
    }
});

function selectObject(model) {
    clearSelection();
    currentSelectedModel = model;
    activeSelection.push(model);
    model.traverse(child => {
        if(child.isMesh) {
            child.material.emissive.set(0xff0000);
            child.material.emissiveIntensity = 0.5;
        }
    });
    document.getElementById('selected-indicator').style.display = 'block';
}

function clearSelection() {
    activeSelection.length = 0;
    currentSelectedModel = null;
    allModels.forEach(m => m.traverse(c => {
        if(c.isMesh) c.material.emissive.set(0x000000);
    }));
    document.getElementById('selected-indicator').style.display = 'none';
}

// --- 3. 拖拽逻辑 ---
const dragControls = new DragControls(activeSelection, camera, renderer.domElement);
dragControls.transformGroup = true;

dragControls.addEventListener('dragstart', () => controls.enabled = false);
dragControls.addEventListener('dragend', () => controls.enabled = true);
dragControls.addEventListener('drag', (event) => {
    const snap = 0.5; // 0.5米吸附
    event.object.position.x = Math.round(event.object.position.x / snap) * snap;
    event.object.position.z = Math.round(event.object.position.z / snap) * snap;
});

// --- 4. 按钮功能绑定 ---
document.getElementById('btn-plus').addEventListener('pointerdown', (e) => {
    e.stopPropagation();
    if (currentSelectedModel) currentSelectedModel.scale.multiplyScalar(1.1);
});

document.getElementById('btn-minus').addEventListener('pointerdown', (e) => {
    e.stopPropagation();
    if (currentSelectedModel) currentSelectedModel.scale.divideScalar(1.1);
});

document.getElementById('btn-rotate').addEventListener('pointerdown', (e) => {
    e.stopPropagation();
    if (currentSelectedModel) currentSelectedModel.rotation.y += Math.PI / 2; // 旋转90度
});

// --- 5. 加载模型 ---
const loader = new GLTFLoader();
function loadModel(path, x, z) {
    loader.load(path, (gltf) => {
        const model = gltf.scene;
        const box = new THREE.Box3().setFromObject(model);
        model.position.set(x, -box.min.y, z); // 自动贴地
        scene.add(model);
        allModels.push(model);
    });
}

// 请确保文件名与你 GitHub 仓库里的英文名一致
loadModel('./model/1.glb', 0, 0);
loadModel('./model/wall.glb', 4, 0);
loadModel('./model/pillar.glb', -4, 0);

// --- 6. 场景辅助与循环 ---
scene.add(new THREE.AmbientLight(0xffffff, 1.2));
const dirLight = new THREE.DirectionalLight(0xffffff, 1);
dirLight.position.set(10, 20, 10);
scene.add(dirLight);
scene.add(new THREE.GridHelper(30, 30, 0x444444, 0x444444));

function animate() {
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>

</body>
</html>
